<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Distrito — Proposta Técnico-Comercial · Projeto Yara Fase 2</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="deck.css">
<style>
  html, body { margin: 0; background: #1a1a1a; }
  deck-stage { --accent: #d0095f; }

  /* ─── Yara-specific slide extensions ──────────────────────────────────── */

  /* 4-col pillar grid reutilizado para cards de objetivo */
  .obj-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-top: 8px;
  }
  .obj-card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: 32px 28px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .obj-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--color-brand);
  }
  .obj-card .n {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    color: var(--color-brand);
    text-transform: uppercase;
  }
  .obj-card h3 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    line-height: var(--leading-tight);
    letter-spacing: var(--tracking-tight);
    color: var(--color-fg-1);
    margin: 0;
  }
  .obj-card p {
    font-size: 15px;
    line-height: var(--leading-normal);
    color: var(--color-fg-2);
    margin: 0;
  }

  /* Arch columns */
  .arch-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    position: relative;
  }
  .arch-col {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-right: none;
    padding: 28px 24px 32px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .arch-col:first-child { border-radius: var(--radius-xl) 0 0 var(--radius-xl); }
  .arch-col:last-child  { border-radius: 0 var(--radius-xl) var(--radius-xl) 0; border-right: 1px solid var(--color-border); }
  .arch-col-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--color-brand);
    padding-bottom: 14px;
    border-bottom: 1.5px solid var(--color-brand);
    margin-bottom: 18px;
  }
  .arch-item {
    font-size: 13px;
    line-height: var(--leading-normal);
    color: var(--color-fg-2);
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .arch-item:last-child { border-bottom: none; }
  .arch-item::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--color-brand);
    flex-shrink: 0;
    margin-top: 5px;
  }
  /* Arrow connectors between arch cols */
  .arch-arrow {
    position: absolute;
    top: 50%;
    width: 28px;
    height: 2px;
    background: var(--color-brand);
    transform: translateY(-50%);
    z-index: 2;
  }
  .arch-arrow::after {
    content: "";
    position: absolute;
    right: -1px; top: -5px;
    border: 6px solid transparent;
    border-left-color: var(--color-brand);
  }

  /* Aceite grid */
  .aceite-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-top: 8px;
  }
  .aceite-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--color-brand);
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--color-brand);
    margin-bottom: 4px;
  }
  .aceite-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid var(--color-border);
  }
  .aceite-item:last-child { border-bottom: none; }
  .aceite-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--color-brand);
    flex-shrink: 0;
    margin-top: 5px;
  }
  .aceite-key {
    font-size: 14px;
    font-weight: 700;
    color: var(--color-fg-1);
    line-height: 1.3;
  }
  .aceite-val {
    font-size: 13px;
    color: var(--color-fg-2);
    line-height: var(--leading-normal);
    margin-top: 3px;
  }

  /* Flow jornada */
  .flow-row {
    display: flex;
    align-items: center;
    margin-top: 48px;
  }
  .flow-node {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .flow-box {
    width: 120px; height: 88px;
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .flow-box::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--color-brand);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  }
  .flow-icon-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-brand);
    text-align: center;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0 10px;
    line-height: 1.3;
  }
  .flow-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    color: var(--color-fg-1);
    text-align: center;
  }
  .flow-connector {
    width: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .flow-connector-line {
    width: 100%; height: 2px;
    background: var(--color-brand);
    position: relative;
  }
  .flow-connector-line::after {
    content: "";
    position: absolute;
    right: -1px; top: -5px;
    border: 6px solid transparent;
    border-left-color: var(--color-brand);
  }
  .flow-connector-label {
    font-size: 9px;
    color: var(--color-fg-3);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-align: center;
    white-space: nowrap;
  }

  /* Ask & answers chat */
  .qa-chat { display: flex; flex-direction: column; gap: 20px; margin-top: 16px; }
  .qa-pair { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 0; align-items: center; }
  .bubble-q {
    background: var(--color-brand-light);
    border: 1px solid #f0d0dd;
    border-radius: var(--radius-xl) var(--radius-xl) var(--radius-xl) 4px;
    padding: 20px 24px;
  }
  .bubble-a {
    background: var(--color-bg-dark);
    border-radius: var(--radius-xl) var(--radius-xl) 4px var(--radius-xl);
    padding: 20px 24px;
  }
  .bubble-lbl {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .bubble-q .bubble-lbl { color: var(--color-brand); }
  .bubble-a .bubble-lbl { color: #8a8a8a; }
  .bubble-q .bubble-text { font-size: 14px; color: var(--color-fg-1); font-style: italic; line-height: var(--leading-normal); }
  .bubble-a .bubble-text { font-size: 14px; color: #ffffff; line-height: var(--leading-normal); }
  .qa-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
  }
  .qa-arrow svg { width: 20px; height: 20px; }

  /* Sprint table */
  .sprint-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 16px; }
  .sprint-table th {
    text-align: left;
    padding: 12px 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: var(--tracking-widest);
    color: #8a8a8a;
    border-bottom: 1.5px solid var(--color-fg-1);
  }
  .sprint-table td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--color-border);
    vertical-align: top;
    font-size: 13px;
    color: var(--color-fg-2);
    line-height: var(--leading-normal);
  }
  .sprint-table td.sp-name {
    font-weight: 700;
    color: var(--color-brand);
    font-size: 14px;
    white-space: nowrap;
  }
  .sprint-table td.sp-period {
    font-size: 12px;
    color: #8a8a8a;
    white-space: nowrap;
  }
  .sprint-item {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 5px; font-size: 12px; color: var(--color-fg-2);
  }
  .sprint-item::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--color-brand);
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* Metrics */
  .metrics-half { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 16px; }
  .metric-group-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--color-brand);
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--color-brand);
    margin-bottom: 20px;
  }
  .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .metric-card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: 24px 20px;
    text-align: center;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .metric-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--color-brand);
  }
  .metric-val {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 700;
    color: var(--color-brand);
    letter-spacing: var(--tracking-tight);
    line-height: 1;
    margin-bottom: 6px;
  }
  .metric-key {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--color-fg-1);
    margin-bottom: 8px;
  }
  .metric-desc {
    font-size: 12px;
    color: var(--color-fg-2);
    line-height: var(--leading-snug);
  }

  /* Squad cards */
  .squad-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 8px; }
  .squad-card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .squad-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--color-brand);
  }
  .squad-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--color-brand-light);
    border: 1.5px solid #f0d0dd;
  }
  .squad-role {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--color-brand);
    margin-top: 4px;
  }
  .squad-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--color-fg-1);
    line-height: var(--leading-snug);
  }
  .squad-alloc {
    font-size: 12px;
    color: var(--color-fg-2);
    line-height: var(--leading-normal);
    margin-top: auto;
  }

  /* Pricing table extended */
  .pricing-total td.label { font-size: 18px !important; }
  .pricing-total td.value { font-size: 28px !important; color: var(--color-brand) !important; }

  /* Termos comerciais inline style */
  .info-bar {
    background: var(--color-brand-light);
    border: 1px solid #f0d0dd;
    border-radius: var(--radius-md);
    padding: 20px 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    margin-top: 24px;
  }
  .info-bar-item dt {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: #8a8a8a;
    margin-bottom: 6px;
  }
  .info-bar-item dd {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-fg-1);
    margin: 0;
    line-height: var(--leading-snug);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="deck-stage.js"></script>

<script type="text/babel">
// ─── Shared primitives (exact Distrito design system patterns) ────────────────

}

function Footer({ label = "AI FACTORY  ·  PROJETO YARA  ·  FASE 2" }) {
  return (
    <div className="slide-footer">
      <span className="label">
        <DistritoLogo />
        {label}
      </span>
      <span className="right">2026</span>
    </div>
  );
}

function Title({ children }) {
  return (
    <div className="slide-title-block">
      <h1 className="slide-title">{children}</h1>
    </div>
  );
}

function Eyebrow({ children }) {
  return <div className="eyebrow">{children}</div>;
}

function Divider({ num, label, title, sub }) {
  return (
    <section className="bleed" data-screen-label={`${num} ${label}`}>
      <div className="divider">
        <div className="num">SEÇÃO {num}</div>
        <h2 style={{ whiteSpace: "pre-line" }}>{title}</h2>
        {sub && <div className="sub">{sub}</div>}
      </div>
    </section>
  );
}

// ─── 01 COVER ────────────────────────────────────────────────────────────────
function SlideCover() {
  return (
    <section className="bleed" data-screen-label="01 Capa">
      <div className="cover">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <DistritoLogo />
          <div className="cover-pill">PROPOSTA TÉCNICO-COMERCIAL</div>
        </div>
        <h1 className="cover-title">
          Projeto Yara —<br/>
          <b>Fase 2: MVP.</b>
        </h1>
        <dl className="cover-meta">
          <div><dt>Cliente</dt><dd>Yara Brasil</dd></div>
          <div><dt>Projeto</dt><dd>Evolução para MVP Operacional</dd></div>
          <div><dt>Data</dt><dd>Maio 2026</dd></div>
          <div><dt>Validade</dt><dd>30 dias</dd></div>
        </dl>
      </div>
    </section>
  );
}

// ─── 02 SUMÁRIO ───────────────────────────────────────────────────────────────
function SlideToc() {
  const items = [
    "Visão estratégica",
    "Escopo técnico e funcional",
    "Proposta de escopo & critérios de aceite",
    "Arquitetura da solução",
    "Jornada da informação",
    "Inteligência em campo",
    "Cronograma — 4 meses",
    "Entregáveis por sprint",
    "Critérios de sucesso",
    "Squad do projeto",
    "Investimento & próximos passos",
  ];
  const half = Math.ceil(items.length / 2);
  return (
    <section data-screen-label="02 Sumário">
      <Title>Sumário</Title>
      <div className="toc">
        {[items.slice(0, half), items.slice(half)].map((col, ci) => (
          <div key={ci}>
            {col.map((it, i) => {
              const n = ci * half + i + 1;
              return (
                <div key={i} className="toc-item">
                  <span className="n">{String(n).padStart(2, "0")}</span>
                  <span className="t">{it}</span>
                  <span className="p">SEÇÃO {String(n).padStart(2, "0")}</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <Footer />
    </section>
  );
}

// ─── 03 VISÃO ESTRATÉGICA ─────────────────────────────────────────────────────
function SlideVisao() {
  const objs = [
    { n: "01", h: "Entrega em 4 meses", d: "Ciclo ágil de desenvolvimento para validação rápida e redução do time-to-market." },
    { n: "02", h: "Validação em campo", d: "Testar com consultores reais, garantindo aderência ao dia a dia da força de vendas Yara." },
    { n: "03", h: "Mobilidade & inteligência", d: "Recomendações de IA diretamente na palma da mão — onde a decisão acontece." },
    { n: "04", h: "Fundação sólida", d: "Arquitetura técnica robusta e escalável para futuras expansões nacionais." },
  ];
  return (
    <section data-screen-label="03 Visão">
      <Title>Visão estratégica da Fase 2</Title>
      <p className="body-lg" style={{ marginBottom: 32, maxWidth: 1400 }}>
